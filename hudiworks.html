<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hu Di Artworks – Contemporary Digital &amp; Mixed Media Artist</title>
<meta name="description" content="Hu Di creates immersive, interactive installations merging AI, integrated media, and miniature worlds."/>
<style>
@font-face{
  font-family:'MG';
  src:url('https://type.cargo.site/files/CargoMonumentGroteskPlusVariable.woff2') format('woff2');
  font-weight:100 900;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#2adf51;
  --g-dim:rgba(42,223,81,0.75);
  --nav-w:31%;
  --f:'MG','Helvetica Neue',Arial,sans-serif;
}
html,body{
  width:100%;min-height:100vh;
  background:#fff;
  font-family:var(--f);
  font-size:1rem;
  font-weight:400;
  -webkit-font-smoothing:antialiased;
  color:#111;
}
a{color:inherit;text-decoration:none;cursor:pointer}

/* ── SIDEBAR ── */
#sidebar{
  position:fixed;top:0;left:0;
  width:var(--nav-w);height:100vh;
  overflow-y:auto;scrollbar-width:none;
  padding:22px 22px 32px 26px;
  display:flex;flex-direction:column;
  z-index:10;
  background:#fff;
  transition:background .3s;
}
body.at-home #sidebar{background:transparent;}
#sidebar::-webkit-scrollbar{display:none}

/* Kaleidoscope canvas — homepage only, full screen bg */
#kCanvas{
  position:fixed;top:0;left:0;
  width:100vw;height:100vh;
  z-index:0;
  pointer-events:none;
  display:none; /* shown on homepage only */
}

.brand{
  font-size:24px;
  font-weight:700;
  color:var(--g);
  line-height:1.32;
  margin-bottom:71px;
  cursor:pointer;
}
.brand:hover{opacity:.8}

.nav-section{margin-bottom:0.3rem}
.nav-label{
  font-size:14.62px;
  font-weight:700;
  color:var(--g);
  margin-bottom:34px;
  display:block;
  line-height:19px;
}
.nav-ul{
  list-style:none;
  padding-left:0;
  margin-bottom:0;
}
.nav-ul li{line-height:19px;margin:0;}
.nav-ul li a{
  font-size:14.62px;
  color:var(--g);
  transition:opacity .15s;
  display:block;
  line-height:19px;
}
.nav-ul li a:hover{opacity:.6}
.nav-ul li a.active{opacity:1;text-decoration:underline;text-underline-offset:2px}

.nav-gap{display:none}
#nav-works{margin-bottom:40px;}

.nav-extras{margin-top:71px;padding-top:0;}
.nav-extras a{
  display:block;
  font-size:14.62px;
  color:var(--g);
  line-height:19px;
}
.nav-extras a+a{margin-top:12px;}
.nav-extras a:hover{opacity:.6}

/* ── MAIN ── */
#main{
  margin-left:var(--nav-w);
  min-height:100vh;
  width:calc(100% - var(--nav-w));
  position:relative;
  z-index:1;
}

/* ── HOMEPAGE GALLERY ── */
#home{
  margin-left:26%;
  width:74%;
  max-width:none;
  padding:0;
}
.g-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:.5rem;
  padding:.5rem;
}
.g-cell{
  position:relative;
  overflow:hidden;
  cursor:pointer;
  background:#ddd;
  aspect-ratio:4/3;
}
.g-cell img{
  width:100%;height:100%;
  object-fit:cover;display:block;
  transition:transform .4s ease,opacity .3s;
}
.g-cell:hover img{transform:scale(1.04);opacity:.88}
.g-overlay{
  position:absolute;bottom:0;left:0;right:0;
  padding:.55rem .7rem;
  background:linear-gradient(transparent,rgba(0,0,0,.58));
  color:#fff;
  opacity:0;
  transform:translateY(5px);
  transition:opacity .22s,transform .22s;
  pointer-events:none;
}
.g-cell:hover .g-overlay{opacity:1;transform:translateY(0)}
.g-overlay-title{font-size:.72rem;font-weight:600;display:block;line-height:1.25;letter-spacing:.01em}
.g-overlay-year{font-size:.65rem;opacity:.78;display:block;margin-top:.12rem}

/* ── PROJECT PAGE ── */
#proj-view{display:none}
.proj-header{
  padding:2.2rem 2.4rem 0 2.4rem;
  border-bottom:1px solid rgba(0,0,0,.09);
  margin-bottom:2rem;
}
.proj-title{
  font-size:1.5rem;
  font-weight:400;
  color:var(--g);
  line-height:1.25;
  letter-spacing:-.01em;
  padding-bottom:.55rem;
}
.proj-info{
  font-size:.85rem;
  color:rgba(0,0,0,.45);
  line-height:1.6;
  font-weight:400;
  padding-bottom:1.5rem;
  max-width:780px;
}
.proj-body{
  padding:0 2.4rem 5rem 2.4rem;
}
/* blocks */
.block-img{margin-bottom:.45rem}
.block-img img{
  width:100%;height:auto;display:block;
  background:#f0f0f0;
}
/* portrait hero: constrain to first screen */
.block-img--portrait-hero img{
  width:auto;
  max-width:100%;
  max-height:calc(100vh - 200px);
  height:auto;
}
.block-grid{
  display:grid;
  gap:.45rem;
  margin-bottom:.45rem;
}
.block-grid img{width:100%;height:auto;display:block;object-fit:cover}
.block-caption{
  font-size:.82rem;
  font-weight:500;
  color:rgba(0,0,0,.5);
  line-height:1.55;
  margin-bottom:2.4rem;
  max-width:780px;
}
/* text block: wrap + paragraphs */
.text-block-wrap{
  margin-bottom:2.4rem;
  max-width:780px;
}
.text-meta{
  font-size:.85rem;
  line-height:1.6;
  color:rgba(0,0,0,.45);
  margin-bottom:.25em;
  font-weight:400;
}
.text-meta:last-child{margin-bottom:1.6rem}
.text-para{
  font-size:1rem;
  line-height:1.78;
  color:rgba(0,0,0,.76);
  margin-bottom:.85em;
}
.text-para:last-child{margin-bottom:0}
/* legacy .block-text kept for info pages */
.block-text{
  font-size:1rem;
  line-height:1.78;
  color:rgba(0,0,0,.76);
  margin-bottom:.85em;
  max-width:780px;
}
.block-video{
  margin-bottom:2.4rem;
  position:relative;
  padding-bottom:56.25%;
  height:0;
  overflow:hidden;
  max-width:100%;
}
.block-video iframe{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  border:none;
}

/* ── INFO/WORKSHOP PAGE ── */
#info-view{display:none}
.info-header{padding:2.2rem 2.4rem 0 2.4rem;border-bottom:1px solid rgba(0,0,0,.09);margin-bottom:2rem}
.info-title{font-size:1.5rem;font-weight:400;color:var(--g);line-height:1.25;letter-spacing:-.01em;padding-bottom:1.5rem}
.info-body{
  padding:0 2.4rem 5rem 2.4rem;
  max-width:780px;
}
.info-body .text-para,.info-body .block-text{font-size:1rem;line-height:1.8;color:rgba(0,0,0,.76);margin-bottom:.85em}
.info-body .block-img{margin-bottom:1.4rem}
.info-body .block-img img{max-width:100%;height:auto;display:block}

/* ── WORKSHOP / INFO BLOCK TYPES ── */
.block-heading{
  font-size:.75rem;
  font-weight:700;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:rgba(0,0,0,.38);
  margin:2.4rem 0 .55rem 0;
}
.block-heading:first-child{margin-top:.4rem}
.block-list{
  list-style:none;
  padding:0;
  margin:0 0 1.4rem 0;
}
.block-list li{
  font-size:1rem;
  line-height:1.78;
  color:rgba(0,0,0,.76);
  padding-left:1.3em;
  position:relative;
  margin-bottom:.25em;
}
.block-list li::before{
  content:'—';
  position:absolute;
  left:0;
  color:rgba(0,0,0,.25);
  font-size:.9em;
}
.block-divider{
  border:none;
  border-top:1px solid rgba(0,0,0,.09);
  margin:2.8rem 0;
}
.block-contact{
  margin-top:1rem;
}
.block-contact a{
  color:rgba(0,0,0,.65);
  text-decoration:none;
  border-bottom:1px solid rgba(0,0,0,.2);
}
.block-contact a:hover{color:var(--g);border-bottom-color:var(--g)}

/* ── WORKSHOP VISUAL BLOCKS ── */

/* icon-cards: 2×2 grid */
.block-icon-cards{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1px;
  background:rgba(0,0,0,.08);
  border:1px solid rgba(0,0,0,.08);
  margin:0 0 2rem 0;
}
.icon-card{
  background:#fff;
  padding:1.35rem 1.15rem 1.2rem;
}
.icon-card svg{
  width:20px;height:20px;
  display:block;
  stroke:var(--g);
  fill:none;
  stroke-width:1.6;
  stroke-linecap:round;
  stroke-linejoin:round;
  margin-bottom:.75rem;
}
.icon-card-label{
  font-size:.72rem;
  font-weight:700;
  letter-spacing:.09em;
  text-transform:uppercase;
  color:var(--g);
  margin-bottom:.38rem;
}
.icon-card-desc{
  font-size:.88rem;
  line-height:1.65;
  color:rgba(0,0,0,.62);
}

/* format-cards: stacked rows */
.block-format-cards{
  display:flex;
  flex-direction:column;
  gap:1px;
  background:rgba(0,0,0,.08);
  border:1px solid rgba(0,0,0,.08);
  margin:0 0 2rem 0;
}
.format-card{
  background:#fff;
  padding:1.05rem 1.15rem;
  display:grid;
  grid-template-columns:6.5rem 1fr;
  gap:1rem;
  align-items:start;
}
.format-time{
  font-size:.75rem;
  color:rgba(0,0,0,.35);
  line-height:1.4;
  padding-top:.18rem;
  font-variant-numeric:tabular-nums;
}
.format-name{
  font-size:.88rem;
  font-weight:700;
  color:var(--g);
  margin-bottom:.2rem;
  letter-spacing:.01em;
}
.format-desc{
  font-size:.87rem;
  line-height:1.65;
  color:rgba(0,0,0,.65);
}

/* tag-cloud: pill tags */
.block-tag-cloud{
  display:flex;
  flex-wrap:wrap;
  gap:.45rem;
  margin:0 0 2rem 0;
}
.topic-tag{
  font-size:.84rem;
  color:rgba(0,0,0,.68);
  border:1px solid rgba(0,0,0,.14);
  padding:.32em .85em;
  border-radius:99px;
  line-height:1.5;
  transition:border-color .15s,color .15s;
  cursor:default;
}
.topic-tag:hover{border-color:var(--g);color:var(--g)}

/* audience-tags: simple chips */
.block-audience-tags{
  display:flex;
  flex-wrap:wrap;
  gap:.38rem;
  margin:0 0 1rem 0;
}
.audience-chip{
  font-size:.82rem;
  background:rgba(0,0,0,.04);
  color:rgba(0,0,0,.65);
  padding:.28em .75em;
  border-radius:3px;
  line-height:1.5;
}

/* contact-links */
.block-contact-links{
  display:flex;
  flex-direction:column;
  gap:.65rem;
  margin:.4rem 0 2rem 0;
}
.contact-link-row{
  display:flex;
  align-items:center;
  gap:.65rem;
  color:rgba(0,0,0,.68);
  text-decoration:none;
  font-size:.95rem;
}
.contact-link-row svg{
  width:17px;height:17px;
  flex-shrink:0;
  stroke:currentColor;
  fill:none;
  stroke-width:1.6;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.contact-link-row:hover{color:var(--g)}

@media(max-width:900px){
  .block-icon-cards{grid-template-columns:1fr 1fr}
  .format-card{grid-template-columns:5rem 1fr}
}
@media(max-width:480px){
  .block-icon-cards{grid-template-columns:1fr}
  .format-card{grid-template-columns:1fr;gap:.3rem}
  .format-time{font-size:.72rem}
}

/* ── PAGE TRANSITIONS ── */
@keyframes pageFadeIn{
  from{opacity:0;transform:translateY(7px)}
  to{opacity:1;transform:translateY(0)}
}
.page-enter{animation:pageFadeIn .2s ease both}

/* ── MOBILE ── */
#m-header{
  display:none;position:fixed;top:0;left:0;right:0;z-index:300;
  background:#fff;padding:.8rem 1.1rem;
  border-bottom:1px solid rgba(0,0,0,.1);
  align-items:center;justify-content:space-between;
}
.m-logo{font-size:.95rem;font-weight:700;color:var(--g);cursor:pointer}
.burger{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;gap:5px;padding:3px}
.burger span{display:block;width:22px;height:1.5px;background:var(--g);transition:all .22s}
.burger.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
.burger.open span:nth-child(2){opacity:0}
.burger.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}
#m-nav{
  display:none;position:fixed;inset:0;z-index:299;
  background:#fff;padding:4.5rem 1.5rem 2rem;
  overflow-y:auto;transform:translateX(-100%);transition:transform .28s;
}
#m-nav.open{transform:translateX(0)}
#m-nav .nav-ul{list-style:none;padding-left:0;}
#m-nav .nav-ul li a{color:var(--g);font-size:.9rem;line-height:1.9}
#m-nav .nav-label{color:var(--g);font-weight:700;font-size:.9rem;margin-bottom:.1rem;display:block}
#m-nav .nav-extras a{color:var(--g);font-size:.9rem;line-height:2.2;display:block}

@media(max-width:900px){
  #sidebar,#kCanvas{display:none!important}
  #m-header{display:flex}
  #m-nav{display:block}
  #main{margin-left:0;width:100%;padding-top:3.2rem}
  #home{max-width:100%;padding:.4rem;margin-left:0;width:100%}
  .g-grid{grid-template-columns:repeat(2,1fr);gap:.4rem;padding:.4rem}
  .proj-body,.info-body{padding:0 1.1rem 3.5rem 1.1rem;max-width:100%}
  .proj-header,.info-header{padding:1.4rem 1.2rem 1rem 1.2rem}
  .proj-title,.info-title{font-size:1.2rem}
  .proj-body,.info-body{padding:0 1.2rem 3.5rem 1.2rem}
  .text-para,.block-text{font-size:.95rem;line-height:1.75}
  .text-meta{font-size:.82rem}
  .text-block-wrap{max-width:100%}
  .block-caption{font-size:.78rem}
}
@media(max-width:480px){
  .g-grid{grid-template-columns:1fr;gap:.35rem}
  .proj-title,.info-title{font-size:1.05rem}
  .text-para,.block-text{font-size:.9rem;line-height:1.7}
  .text-meta{font-size:.78rem}
}
</style>
</head>
<body>

<!-- Kaleidoscope (left sidebar bg, homepage only) -->
<canvas id="kCanvas"></canvas>

<!-- Mobile header -->
<header id="m-header">
  <span class="m-logo" onclick="goHome()">Hu Di's Portfolio</span>
  <button class="burger" id="burger" onclick="toggleNav()">
    <span></span><span></span><span></span>
  </button>
</header>

<!-- Mobile nav -->
<div id="m-nav">
  <span class="nav-label">Projects</span>
  <ul class="nav-ul" id="m-nav-works"></ul>
  <div style="height:.7rem"></div>
  <span class="nav-label">Curations</span>
  <ul class="nav-ul" id="m-nav-curations"></ul>
  <div style="height:.7rem"></div>
  <div class="nav-extras" id="m-nav-extras" style="margin-top:.5rem"></div>
</div>

<!-- Sidebar -->
<nav id="sidebar">
  <div class="brand" onclick="goHome()">Hu Di's Portfolio</div>

  <div class="nav-section">
    <span class="nav-label">Projects</span>
    <ul class="nav-ul" id="nav-works"></ul>
  </div>

  <div class="nav-gap"></div>

  <div class="nav-section">
    <span class="nav-label">Curations</span>
    <ul class="nav-ul" id="nav-curations"></ul>
  </div>

  <div class="nav-extras" id="nav-extras"></div>
</nav>

<!-- Main area -->
<main id="main">

  <!-- Homepage gallery -->
  <div id="home">
    <div class="g-grid" id="gallery"></div>
  </div>

  <!-- Project view -->
  <div id="proj-view">
    <div class="proj-header">
      <h1 class="proj-title" id="proj-title"></h1>
      <p class="proj-info" id="proj-info"></p>
    </div>
    <div class="proj-body" id="proj-body"></div>
  </div>

  <!-- Info/Workshop view -->
  <div id="info-view">
    <div class="info-header">
      <h1 class="info-title" id="info-title"></h1>
    </div>
    <div class="info-body" id="info-body"></div>
  </div>

</main>

<script>
// ═══════════════════════════════════════════════════════════════════════
// 项目数据区  —  在下方找到对应项目常量进行编辑，项目之间互不影响
// 块类型说明：title / image / text / caption / grid / video
// ═══════════════════════════════════════════════════════════════════════

// ─── The Garden of Digital Delights ──────────────────────────────────
const PAGE_THE_GARDEN_OF_DIGITAL_DELIGHTS = {
  purl:  "the-garden-of-digital-delights",
  title: "The Garden of Digital Delights",
  thumb: "images/garden/7J7A7684.JPG",
  blocks: [
    { type:"title", content:"The Garden of Digital Delights" },
    { type:"image", url:"images/garden/7J7A7684.JPG", thumb:"images/garden/7J7A7684.JPG", w:6960, h:4640, name:"7J7A7684.JPG" },
    { type:"info", content:"March 2026  ·  Solo exhibition, REEF, Los Angeles  ·  Rubbing prints, miniature figurines, electronics, painting, site installation" },
    { type:"text", content:`A solo exhibition staged inside REEF, the downtown Los Angeles tower whose commercial life has been slowly emptying for years. Three bodies of work are arranged through the gallery as an organic garden, each rooted in the building and in the digital condition the building was built to house.

    Three series of work are arranged together through the space as an organic whole: prints made from rubbings of REEF's own environment, an installation combining miniature human figurines with electronic package components, and a group of paintings.

    REEF itself is an important aspect of the work. Once an emblem of the LA office tower—full of corporate tenants, brokers, glossy ground-floor retail—the building has been quietly emptying. In the vacuum left by commercial decline, artists have moved in: studios on the upper floors, exhibitions in former showrooms, workshops in vacant lobbies. The Garden of Digital Delights reads this transformation both archaeologically and tenderly: the rise and fall of the skyscraper, the retreat of capital, and the incidental blooming of an art community in its wake.

Set against the context of urban life and the digital age, the exhibition takes REEF itself as a subject—a typical LA skyscraper and office tower whose commercial life has been receding, and the art community that has taken root as that commercial community has declined.` },

// ─── Echo Chamber Realms ─────────────────────────────────────────────
const PAGE_ECHO_CHAMBER_REALMS_1 = {
  purl:  "echo-chamber-realms-1",
  title: "Echo Chamber Realms",
  thumb: "images/X1737148215781859239393866176583_a437c358958c9e8ce567767cf9f32e4c.jpg",

When a visitor enters, they go through the path in the miniture city and find out that the conversation comes from the puppets and that they can also join the conversation and talk to the three puppets. The participation of the visitor will change the the course of the conversation forever.

    { type:"text", content:`For 100 days, Hu Di's location was visible to anyone with a phone. A QR code—distributed on flyers and posted online—led to a live map with a blue dot marking her position in real time. The dot moved when she walked, held still when she sat. There was no event attached to it. No performance scheduled. If someone wanted to find her, they could try.

  { type:"text", content:"“You won’t want your piece to be too on the nose.”  —  Professor’s critique note" },
  { type:"text", content:`So, I decided to make a joke.

This project was originally intended to be just a casual bit of fun in academic circles, a playful response to the norms. However, funny things happen in the special context of the academy.

When I showed this work in the MFA group show in the school. Professors were not so impressed, "This is exactly What I Meant: it is TOO on the nose". 

In fact, in a way, I agree with them. The overt nature of this piece somewhat diminishes its conceptually sublime charm. 

But it was a hit with the student body. Until several months after the show, too on the nose was still a meme among the students, and I was contacted by many students who loved the work.

The aspect of this incident that intrigued me the most is that, as a professional, I fully understand the professors' perspectives, as I can vividly feel the drawbacks they refer to as "too on the nose." The fear of not being understood is a common occurrence in the entire artistic creation process. I became overly fixated on the goal of "making people understand " and this sentiment gradually affected the purity of my exploration of personal concerns, placing a fictional audience above the authentic self. I realized the need to adjust my mindset.

Interestingly, contrasting views from my peers transformed into a kind of palindrome, reigniting discussions on "norms" from their perspectives. I see this as a collective projection, reflecting a shift in collective awareness under individual viewpoints, a collective individualization that embodies the impulse to "break free" in contemporary society. ` },

    { type:"text", content:`A toy train moves along a circular track laid through a miniature city. It pushes a small cluster of farm animal figurines as it goes. Around the track, tiny human figures have been arranged in formations—rows, clusters, patterns—suggesting ceremony or governance, though what they are doing remains unclear. The sense of purpose accumulates, then disperses.

When the gallery lights dim, the train's headlight throws the city's silhouette onto the wall in slow revolution. Buildings, figures, and animals rotate in shadow. No one is operating anything.

The work has been shown twice. At CalArts, it occupied a corner of the gallery. At Cervera Yoon Gallery, it was installed in the bathroom—placed where visitors would encounter it while sitting on the toilet, alone, without the expectation of encountering art. There, an immersive, absurd experience unfolded.` },

    { type:"info", content:"2023  ·  California Institute of the Arts, Los Angeles  ·  Three-room installation, live performance, found materials, sound, participatory exchange" },
    { type:"text", content:`Visitors entering the gallery are each handed a block of ice by a performer at the door. Inside the ice, sealed and slowly dissolving, is a fragment of rubber glove.

The first room: a performer wearing rubber gloves moves between four hanging mechanisms mounted above four rice cookers on the floor. A large "cow" sculpture holds rice in its belly; the performer scoops it out and loads it onto the hangers. The rice falls, one grain at a time, into the cookers below. The sound of it landing fills the room. The performer cycles between the four stations without pause.

The second room: three chairs face a camera on a tripod. A performer helps visitors sit, introduces the camera as an artwork, and invites them to critique it. Whenever anyone speaks, the camera turns toward that person with a mechanical click.

The third room: a table covered in sorted specimen bags—objects organized into categories. Visitors may trade their ice—still melting, the rubber fragment now more or less exposed—for any bag they choose. A performer records the exchange: who took what, at what time.

The three rooms stage production, criticism, and exchange in sequence. The ice each visitor carries is both timestamp and currency; it marks time as it dissolves.` },

// Extract year from a page's blocks
function pageYear(p) {
  for (const b of p.blocks) {
    if (b.type === 'text' || b.type === 'caption' || b.type === 'info') {
      const m = b.content.match(/\b(20\d{2})\b/);
      if (m) return m[1];
    }
  }
  return '';
}

// Render blocks for a page
function renderBlocks(blocks, container) {
  container.innerHTML = '';
  let firstImg = true;
  blocks.forEach(b => {
    if (b.type === 'title') return; // already shown in header
    if (b.type === 'info') return;  // shown in proj-info, not body
    if (b.type === 'image') {
      const isPortraitHero = firstImg && b.h && b.w && (b.h > b.w * 1.15);
      firstImg = false;
      const div = document.createElement('div');
      div.className = 'block-img' + (isPortraitHero ? ' block-img--portrait-hero' : '');
      const img = document.createElement('img');
      img.src = b.url;
      img.alt = b.name || '';
      img.loading = isPortraitHero ? 'eager' : 'lazy';
      div.appendChild(img);
      container.appendChild(div);
    } else if (b.type === 'grid') {
      const div = document.createElement('div');
      div.className = 'block-grid';
      div.style.gridTemplateColumns = `repeat(${Math.min(b.cols||2, b.images.length)}, 1fr)`;
      b.images.forEach(gi => {
        const img = document.createElement('img');
        img.src = gi.url;
        img.alt = '';
        img.loading = 'lazy';
        div.appendChild(img);
      });
      container.appendChild(div);
    } else if (b.type === 'caption') {
      const div = document.createElement('div');
      div.className = 'block-caption';
      div.textContent = b.content;
      container.appendChild(div);
    } else if (b.type === 'text') {
      const wrap = document.createElement('div');
      wrap.className = 'text-block-wrap';
      const paras = b.content.split(/\n+/).filter(p => p.trim());
      paras.forEach((para, idx) => {
        const p = document.createElement('p');
        // Detect meta lines: short lines at start that look like title/date/medium
        const isMeta = idx < 4 && (
          /^(January|February|March|April|May|June|July|August|September|October|November|December)\s+20\d\d/i.test(para) ||
          /^Medium:/i.test(para) ||
          /^(Size|Dimensions?|Duration|Year|Materials?):/i.test(para) ||
          (idx === 0 && para.length < 60 && !/[.!?]$/.test(para))
        );
        p.className = isMeta ? 'text-meta' : 'text-para';
        p.textContent = para.trim();
        wrap.appendChild(p);
      });
      container.appendChild(wrap);
    } else if (b.type === 'heading') {
      const h = document.createElement('h2');
      h.className = 'block-heading';
      h.textContent = b.content;
      container.appendChild(h);
    } else if (b.type === 'list') {
      const ul = document.createElement('ul');
      ul.className = 'block-list';
      b.items.forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        ul.appendChild(li);
      });
      container.appendChild(ul);
    } else if (b.type === 'divider') {
      const hr = document.createElement('hr');
      hr.className = 'block-divider';
      container.appendChild(hr);
    } else if (b.type === 'icon-cards') {
      const grid = document.createElement('div');
      grid.className = 'block-icon-cards';
      b.items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'icon-card';
        const iconEl = document.createElement('div');
        iconEl.innerHTML = `<svg viewBox="0 0 24 24">${item.icon}</svg>`;
        const label = document.createElement('div');
        label.className = 'icon-card-label';
        label.textContent = item.label;
        const desc = document.createElement('div');
        desc.className = 'icon-card-desc';
        desc.textContent = item.desc;
        card.appendChild(iconEl);
        card.appendChild(label);
        card.appendChild(desc);
        grid.appendChild(card);
      });
      container.appendChild(grid);
    } else if (b.type === 'format-cards') {
      const wrap = document.createElement('div');
      wrap.className = 'block-format-cards';
      b.items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'format-card';
        const time = document.createElement('div');
        time.className = 'format-time';
        time.textContent = item.time;
        const right = document.createElement('div');
        const name = document.createElement('div');
        name.className = 'format-name';
        name.textContent = item.name;
        const desc = document.createElement('div');
        desc.className = 'format-desc';
        desc.textContent = item.desc;
        right.appendChild(name);
        right.appendChild(desc);
        card.appendChild(time);
        card.appendChild(right);
        wrap.appendChild(card);
      });
      container.appendChild(wrap);
    } else if (b.type === 'tag-cloud') {
      const wrap = document.createElement('div');
      wrap.className = 'block-tag-cloud';
      b.items.forEach(item => {
        const tag = document.createElement('span');
        tag.className = 'topic-tag';
        tag.textContent = item;
        wrap.appendChild(tag);
      });
      container.appendChild(wrap);
    } else if (b.type === 'audience-tags') {
      const wrap = document.createElement('div');
      wrap.className = 'block-audience-tags';
      b.items.forEach(item => {
        const chip = document.createElement('span');
        chip.className = 'audience-chip';
        chip.textContent = item;
        wrap.appendChild(chip);
      });
      container.appendChild(wrap);
    } else if (b.type === 'contact-links') {
      const wrap = document.createElement('div');
      wrap.className = 'block-contact-links';
      b.items.forEach(item => {
        const a = document.createElement('a');
        a.className = 'contact-link-row';
        a.href = item.href || '#';
        if (item.href && item.href.startsWith('http')) a.target = '_blank';
        a.innerHTML = `<svg viewBox="0 0 24 24">${item.icon}</svg><span>${item.label}</span>`;
        wrap.appendChild(a);
      });
      container.appendChild(wrap);
    } else if (b.type === 'video') {
      const div = document.createElement('div');
      div.className = 'block-video';
      const iframe = document.createElement('iframe');
      iframe.src = b.url;
      iframe.setAttribute('allow','accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share');
      iframe.setAttribute('allowfullscreen','');
      iframe.setAttribute('referrerpolicy','strict-origin-when-cross-origin');
      div.appendChild(iframe);
      container.appendChild(div);
    }
  });
}

// Navigation
function navigate(purl) {
  const page = pageMap[purl];
  if (!page) { goHome(); return; }
  window.location.hash = '/' + purl;
  setActiveNav(purl);
  document.getElementById('home').style.display = 'none';
  document.getElementById('proj-view').style.display = 'none';
  document.getElementById('info-view').style.display = 'none';
  // Stop kaleidoscope on subpages
  document.getElementById('kCanvas').style.display = 'none';
  document.body.classList.remove('at-home');

  const isExtra = EXTRAS.includes(purl);
  if (isExtra) {
    const v = document.getElementById('info-view');
    document.getElementById('info-title').textContent = NAV_NAMES[purl] || page.title;
    renderBlocks(page.blocks, document.getElementById('info-body'));
    v.style.display = 'block';
    v.classList.remove('page-enter');
    void v.offsetWidth; // reflow
    v.classList.add('page-enter');
  } else {
    const v = document.getElementById('proj-view');
    document.getElementById('proj-title').textContent = NAV_NAMES[purl] || page.title;
    const infoBlock = page.blocks.find(b => b.type === 'info');
    document.getElementById('proj-info').textContent = infoBlock ? infoBlock.content : '';
    renderBlocks(page.blocks, document.getElementById('proj-body'));
    v.style.display = 'block';
    v.classList.remove('page-enter');
    void v.offsetWidth;
    v.classList.add('page-enter');
  }
  window.scrollTo(0, 0);
}

function goHome() {
  window.location.hash = '';
  setActiveNav(null);
  const h = document.getElementById('home');
  document.getElementById('proj-view').style.display = 'none';
  document.getElementById('info-view').style.display = 'none';
  document.getElementById('kCanvas').style.display = 'block';
  document.body.classList.add('at-home');
  h.style.display = 'block';
  window.scrollTo(0, 0);
}

function setActiveNav(purl) {
  document.querySelectorAll('[data-purl]').forEach(a => {
    a.classList.toggle('active', a.dataset.purl === purl);
  });
}

window.addEventListener('hashchange', () => {
  const h = window.location.hash.replace('#/','');
  if (!h) goHome(); else navigate(h);
});
(function() {
  const h = window.location.hash.replace('#/','');
  if (h) navigate(h); else {
    document.body.classList.add('at-home');
    document.getElementById('kCanvas').style.display = 'block';
  }
})();

// ── KALEIDOSCOPE ── full-screen, mouse interactive, tiling
// Interaction model matches original Cargo:
//   • Rotation: constant speed, purely time-driven — mouse has NO effect on speed
//   • Mouse: controls texture pan offset (X+Y), smoothed with 0.20/0.80 lerp
//   • Mouse stops → pan freezes at last position, rotation continues
(function() {
  const canvas = document.getElementById('kCanvas');
  const SLICES = 6;
  const BASE_ROT   = 55 * Math.PI / 180;
  const ROT_SPEED  = 0.0008;  // radians per frame, constant (≈ original -0.04 rad/s at 60fps)

  let rot = 0, imgLoaded = false;
  let mouseX = 0.5, mouseY = 0.5;       // raw mouse (normalised 0-1), frozen when stopped
  let smoothX = 0.5, smoothY = 0.5;     // lerped mouse position (0.20 new / 0.80 old)
  let currentPanX = 0, currentPanY = 0; // derived pixel offsets into pattern
  let pattern = null, patW = 0, patH = 0;

  document.addEventListener('mousemove', e => {
    mouseX = e.clientX / window.innerWidth;
    mouseY = e.clientY / window.innerHeight;
  });

  const img = new Image();
  img.crossOrigin = 'anonymous';

  function makePattern() {
    if (!imgLoaded || !canvas.width) return;
    const r = Math.sqrt(canvas.width*canvas.width + canvas.height*canvas.height)/2 + 10;
    const sc = (r * 0.6) / Math.min(img.naturalWidth, img.naturalHeight);
    const tw = Math.max(1, Math.round(img.naturalWidth  * sc));
    const th = Math.max(1, Math.round(img.naturalHeight * sc));
    patW = tw * 2;  // mirror cell = 2 tiles wide
    patH = th * 2;  // mirror cell = 2 tiles tall
    const pc = document.createElement('canvas');
    pc.width = patW; pc.height = patH;
    const pctx = pc.getContext('2d');
    // top-left: original
    pctx.drawImage(img, 0, 0, tw, th);
    // top-right: flip horizontal
    pctx.save(); pctx.translate(patW, 0); pctx.scale(-1, 1);
    pctx.drawImage(img, 0, 0, tw, th); pctx.restore();
    // bottom-left: flip vertical
    pctx.save(); pctx.translate(0, patH); pctx.scale(1, -1);
    pctx.drawImage(img, 0, 0, tw, th); pctx.restore();
    // bottom-right: flip both
    pctx.save(); pctx.translate(patW, patH); pctx.scale(-1, -1);
    pctx.drawImage(img, 0, 0, tw, th); pctx.restore();
    pattern = canvas.getContext('2d').createPattern(pc, 'repeat');
  }

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    makePattern();
  }

  function draw() {
    const W = canvas.width, H = canvas.height;
    if (!W || !H) return;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, W, H);

    if (!imgLoaded || !pattern) {
      ctx.strokeStyle = 'rgba(42,223,81,0.25)';
      ctx.lineWidth = .8;
      const cx = W/2, cy = H/2;
      for (let i=0;i<10;i++) { ctx.beginPath();ctx.arc(cx,cy,20+i*28,0,Math.PI*2);ctx.stroke(); }
      for (let i=0;i<12;i++) {
        const a=(i/12)*Math.PI*2+rot;
        ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*W,cy+Math.sin(a)*H);ctx.stroke();
      }
      return;
    }

    const cx = W/2, cy = H/2;
    const r  = Math.sqrt(W*W+H*H)/2 + 10;
    const sliceAngle = (Math.PI*2) / SLICES;

    for (let i=0; i<SLICES; i++) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(i * sliceAngle + BASE_ROT + rot);
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.arc(0,0,r,-sliceAngle/2,sliceAngle/2);
      ctx.closePath();
      ctx.clip();
      if (i%2===1) ctx.scale(1,-1);
      try { pattern.setTransform(new DOMMatrix().translate(-patW/2 + currentPanX, -patH/2 + currentPanY)); }
      catch(e) {}
      ctx.fillStyle = pattern;
      ctx.fillRect(-r, -r, r*2, r*2);
      ctx.restore();
    }
  }

  function animate() {
    // ── Rotation: constant speed, no mouse influence ──
    rot += ROT_SPEED;

    // ── Pan: lerp mouse position (0.20 new / 0.80 old), like original Cargo ──
    // mouseX/Y freeze at last position when mouse stops → pan holds still
    smoothX = mouseX * 0.20 + smoothX * 0.80;
    smoothY = mouseY * 0.20 + smoothY * 0.80;
    currentPanX = (smoothX - 0.5) * patW * 0.6;
    currentPanY = (smoothY - 0.5) * patH * 0.6;

    draw();
    requestAnimationFrame(animate);
  }

  img.onload  = () => { imgLoaded = true; makePattern(); };
  img.onerror = () => { imgLoaded = false; };
  img.src = 'https://freight.cargo.site/w/1000/i/S1473981300218595365384609486919/Copy-of-_DSC3970.jpg';

  resize();
  window.addEventListener('resize', resize);
  animate();
})();
</script>
